function heartPath(cx, cy, r) {
    ctx.beginPath();
    ctx.moveTo(cx, cy + r); 
    ctx.bezierCurveTo(cx - r, cy, cx - r, cy - r * 1.5, cx, cy - r * 0.5);
    ctx.bezierCurveTo(cx + r, cy - r * 1.5, cx + r, cy, cx, cy + r);
    ctx.closePath();
}

        let bgHearts = [], constellations = [];
        let globalTime = 0; // used for pulsing glow on highlighted constellations

class BGHeart {
    constructor() { this.reset(); }
    reset() {
        this.bx = Math.random() * canvas.width; 
        this.by = Math.random() * canvas.height;
        this.x = this.bx; 
        this.y = this.by; 
        this.r = Math.random() * 4 + 3; 
        this.density = Math.random() * 10 + 5; 
        this.alpha = Math.random() * Math.PI * 2;
        this.alphaSpeed = 0.01 + Math.random() * 0.02;
        this.vx = (Math.random() - 0.5) * 0.2; 
        this.vy = (Math.random() - 0.5) * 0.2;
    }
    update() {
        this.bx += this.vx; this.by += this.vy;
        if (this.bx < -20) this.bx = canvas.width + 20; 
        if (this.bx > canvas.width + 20) this.bx = -20;
        if (this.by < -20) this.by = canvas.height + 20; 
        if (this.by > canvas.height + 20) this.by = -20;
        
        const dx = mouse.x - this.x, dy = mouse.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (mouse.active && dist < mouse.r) {
            const force = (mouse.r - dist) / mouse.r;
            this.x -= (dx / dist) * force * this.density; 
            this.y -= (dy / dist) * force * this.density;
        } else {
            this.x += (this.bx - this.x) * 0.05; 
            this.y += (this.by - this.y) * 0.05;
        }
        
        this.alpha += this.alphaSpeed;
        ctx.globalAlpha = 0.2 + Math.abs(Math.sin(this.alpha)) * 0.4;
        ctx.fillStyle = '#ff9aa2';
        heartPath(this.x, this.y, this.r); 
        ctx.fill();
    }
}

        class ConStar {
            constructor(nx, ny, highlight) {
                this.bx = nx * canvas.width; this.by = ny * canvas.height;
                this.x = this.bx; this.y = this.by; this.r = highlight ? 6 : 3;
                this.density = Math.random() * 8 + 4; this.highlight = highlight;
                this.pulse = Math.random() * 10;
            }
            update() {
                const dx = mouse.x - this.x, dy = mouse.y - this.y;
                const dist = Math.hypot(dx, dy);
                if (mouse.active && dist < 120) {
                    const force = (120 - dist) / 120;
                    this.x -= (dx / dist) * force * this.density; this.y -= (dy / dist) * force * this.density;
                } else {
                    this.x += (this.bx - this.x) * 0.08; this.y += (this.by - this.y) * 0.08;
                }
                this.pulse += 0.02;
                ctx.save();
                const base = this.highlight ? 0.4 : 0.25;
                const amp  = this.highlight ? 0.6 : 0.45;
                ctx.globalAlpha = base + Math.abs(Math.sin(this.pulse)) * amp;
                ctx.fillStyle = this.highlight ? '#ffffff' : '#ff9aa2';
                if (this.highlight) {
                    // ADDED: extra outer glow halo for highlighted stars
                    const breathe = 0.5 + 0.5 * Math.sin(globalTime * 2);
                    ctx.shadowBlur = 25 + breathe * 10;
                    ctx.shadowColor = 'rgba(255, 20, 147, 0.9)';
                    // draw a slightly larger soft halo behind the star
                    ctx.globalAlpha = 0.25 + breathe * 0.2;
                    heartPath(this.x, this.y, this.r * 1.5);
                    ctx.fillStyle = '#ff1493';
                    ctx.fill();
                    // restore for the main star draw below
                    ctx.globalAlpha = base + Math.abs(Math.sin(this.pulse)) * amp;
                    ctx.fillStyle = '#ffb7c5';
                    ctx.shadowBlur = 22;
                    ctx.shadowColor = 'rgba(255, 183, 197, 0.9)';
                }
                heartPath(this.x, this.y, this.r); ctx.fill();
                ctx.restore();
            }
        }

        function buildScene2D() {

        function drawNebula() {
            const gradient = ctx.createRadialGradient(
                canvas.width/2, canvas.height/2, 0,
                canvas.width/2, canvas.height/2, canvas.width/1.2
            );
            gradient.addColorStop(0, 'rgba(40, 10, 60, 0.3)'); 
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function animate2D() {
            if (threeInitialized) return;
            globalTime += 0.016;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawNebula();
            
            bgHearts.forEach(h => h.update());
            ctx.globalAlpha = 1;
            
            constellations.forEach(con => {
                // ADDED: extra outer glow pass for Scorpius & Sagittarius lines
                if (con.highlight) {
                    const breathe = 0.5 + 0.5 * Math.sin(globalTime * 1.6);
                    ctx.beginPath();
                    con.edges.forEach(([a, b]) => {
                        const sa = con.stars[a], sb = con.stars[b];
                        ctx.moveTo(sa.x, sa.y + sa.r * 0.4); ctx.lineTo(sb.x, sb.y + sb.r * 0.4);
                    });
                    ctx.globalAlpha = 0.25 + breathe * 0.2;
                    ctx.strokeStyle = '#ff1493';
                    ctx.lineWidth = 6;
                    ctx.shadowBlur = 60;
                    ctx.shadowColor = 'rgba(255, 20, 147, 0.95)';
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }

                ctx.beginPath();
                con.edges.forEach(([a, b]) => {
                    const sa = con.stars[a], sb = con.stars[b];
                    ctx.moveTo(sa.x, sa.y + sa.r * 0.4); ctx.lineTo(sb.x, sb.y + sb.r * 0.4);
                });
                ctx.globalAlpha = con.highlight ? 0.6 : 0.60;
                ctx.strokeStyle = '#ffb7c5'; ctx.lineWidth = con.highlight ? 1.5 : 0.8;
                if (con.highlight) {
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = 'rgba(255, 20, 147, 0.7)';
                }
                ctx.stroke();
                ctx.shadowBlur = 0;

                let avgX = 0, avgY = 0;
                con.stars.forEach(s => { 
                    s.update(); 
                    avgX += s.x; avgY += s.y;
                });
                avgX /= con.stars.length;
                avgY /= con.stars.length;

                const distToMouse = Math.hypot(mouse.x - avgX, mouse.y - avgY);
                if (distToMouse < 150) {
                    ctx.save();
                    ctx.textAlign = 'center';
                    const labelAlpha = (150 - distToMouse) / 150;
                    ctx.globalAlpha = labelAlpha;

                    if (con.highlight) {
                        // Neon glow: draw the text 3 times with decreasing blur for a layered neon effect
                        ctx.font = 'bold 13px sans-serif';
                        // Layer 1 — wide outer glow
                        ctx.shadowBlur = 20;
                        ctx.shadowColor = '#ff1493';
                        ctx.fillStyle = '#ff1493';
                        ctx.fillText(con.name.toUpperCase(), avgX, avgY + 35);
                        // Layer 2 — tighter mid glow
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = '#ff69b4';
                        ctx.fillStyle = '#ff69b4';
                        ctx.fillText(con.name.toUpperCase(), avgX, avgY + 35);
                        // Layer 3 — bright core
                        ctx.shadowBlur = 4;
                        ctx.shadowColor = '#ffb7c5';
                        ctx.fillStyle = '#ffb7c5';
                        ctx.fillText(con.name.toUpperCase(), avgX, avgY + 35);
                    } else {
                        ctx.fillStyle = '#ffb7c5';
                        ctx.font = '300 11px sans-serif';
                        ctx.fillText(con.name.toUpperCase(), avgX, avgY + 35);
                    }

                    ctx.restore();
                }
            });
            requestAnimationFrame(animate2D);
        }

                    p.group.position.y = -35;
                    p.group.position.x = (Math.random() - 0.5) * 22;
                    p.group.position.z = (Math.random() - 0.5) * 10;
                    p.mesh.material.opacity = 0;
                    p.shadow.material.opacity = 0;
                });
                photoGroup.visible = true;
                document.getElementById('ui-layer').style.display = "none"; 
            };
            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            camera.position.z = 22;

            function animate() {
                requestAnimationFrame(animate);
                const delta = clock.getDelta();
                const time = clock.elapsedTime;
                controls.update();
                
                // Update globe inside/outside view transition
                updateGlobeInsideView();
                
                if (controls.target) {
                    controls.target.x = THREE.MathUtils.clamp(controls.target.x, -PAN_LIMIT, PAN_LIMIT);
                    controls.target.y = THREE.MathUtils.clamp(controls.target.y, -PAN_LIMIT, PAN_LIMIT);
                    controls.target.z = THREE.MathUtils.clamp(controls.target.z, -PAN_LIMIT, PAN_LIMIT);
                }
                
                bgMat.opacity = 0.8;

                {
                    const pos = bgGeo.attributes.position.array;
                    for (let i = 0; i < bgCount; i++) {
                        const ix = i * 3;
                        pos[ix]     += bgVel[ix]     * (delta * 60);
                        pos[ix + 1] += bgVel[ix + 1] * (delta * 60);
                        pos[ix + 2] += bgVel[ix + 2] * (delta * 60);

                        if (pos[ix] > bgBounds / 2) pos[ix] = -bgBounds / 2;
                        if (pos[ix] < -bgBounds / 2) pos[ix] = bgBounds / 2;
                        if (pos[ix + 1] > bgBounds / 2) pos[ix + 1] = -bgBounds / 2;
                        if (pos[ix + 1] < -bgBounds / 2) pos[ix + 1] = bgBounds / 2;
                        if (pos[ix + 2] > bgBounds / 2) pos[ix + 2] = -bgBounds / 2;
                        if (pos[ix + 2] < -bgBounds / 2) pos[ix + 2] = bgBounds / 2;
                    }
                    bgGeo.attributes.position.needsUpdate = true;
                }

                if (phase === "intro") {
                    const fadeInEnd = 1.5;
                    const explodeStart = 5.0;
                    const explodeDuration = 3.5;
                    const introEnd = explodeStart + explodeDuration;
                    
                    if (time >= explodeStart && time <= introEnd) {
                        hGroup.rotation.y += 0.1;
                    } else {
                        hGroup.rotation.y += 0.04;
                    }
                    hGroupMirror.rotation.y = hGroup.rotation.y;

                    let introOpacity = 1.0;

                    if (time < fadeInEnd) {
                        introOpacity = THREE.MathUtils.clamp(time / fadeInEnd, 0, 1);
                    }
                    else if (time >= fadeInEnd && time < explodeStart) {
                        introOpacity = 1.0;
                    }
                    else if (time >= explodeStart && time <= introEnd) {
                        const tOut = THREE.MathUtils.clamp((time - explodeStart) / explodeDuration, 0, 1);
                        introOpacity = 1.0 - tOut;
                    } else {
                        introOpacity = 0.0;
                    }

                    hMat.opacity = introOpacity;
                    tMatF.opacity = introOpacity;
                    tMatB.opacity = introOpacity;

                    const hA = hGeo.attributes.position.array;
                    if (time < explodeStart) {
                        for (let i = 0; i < hCount; i++) {
                            hA[i*3]     = hBasePos[i*3];
                            hA[i*3 + 1] = hBasePos[i*3 + 1];
                            hA[i*3 + 2] = hBasePos[i*3 + 2];
                        }
                        hGeo.attributes.position.needsUpdate = true;
                    } else if (time >= explodeStart && time <= introEnd) {
                        const tOut = THREE.MathUtils.clamp((time - explodeStart) / explodeDuration, 0, 1);
                        const easeOutQuad = 1 - (1 - tOut) * (1 - tOut);
                        const spreadFactor = 1.5;
                        for (let i = 0; i < hCount; i++) {
                            hA[i*3]     = hBasePos[i*3]     + hVel[i*3]     * easeOutQuad * spreadFactor;
                            hA[i*3 + 1] = hBasePos[i*3 + 1] + hVel[i*3 + 1] * easeOutQuad * spreadFactor;
                            hA[i*3 + 2] = hBasePos[i*3 + 2] + hVel[i*3 + 2] * easeOutQuad * spreadFactor;
                        }
                        hGeo.attributes.position.needsUpdate = true;
                    }

                    if (time >= introEnd) {
                        phase = "globe";
                        hGroup.visible = false;
                        hGroupMirror.visible = false;
                        document.getElementById('ui-layer').style.display = "block";
                        controls.enabled = true;
                    }
                }

                if (phase === "transition") {
                    const transitionElapsed = time - transitionStartTime;
                    const transitionProgress = THREE.MathUtils.clamp(transitionElapsed / TRANSITION_DURATION, 0, 1);
                    
                    globeMat.opacity = Math.max(0, 1 - transitionProgress * 1.2);
                    fireMat.opacity = transitionProgress * 0.8;
                    globe.rotation.y += 0.005;
                    
                    if (transitionProgress >= 1) {
                        phase = "gallery";
                    }
                } else if (phase === "globe" && globeMat.opacity < 1) {
                    globeMat.opacity += 0.02;
                }
                
                if (phase === "globe" || phase === "gallery" || phase === "transition") globe.rotation.y += 0.005;

                if (phase === "globe") {
                    const { width: vw, height: vh } = getViewSizeAtZ(QUOTE_Z);
                    const yBottom = (-vh / 2) - 6;
                    const yTop = (vh / 2) + 6;

                    if (!quotesStartedOnGlobe && globeMat.opacity > 0.05) {
                        quotesStartedOnGlobe = true;
                        lastQuoteSpawnTime = time - QUOTE_SPAWN_INTERVAL;
                        for (let i = quotePlanes.length - 1; i >= 0; i--) {
                            scene.remove(quotePlanes[i]);
                            if (quoteMats[i].map) quoteMats[i].map.dispose();
                            quoteMats[i].dispose();
                        }
                        quotePlanes.length = 0;
                        quoteMats.length = 0;
                        quoteIndices.length = 0;
                        spawnQuotePlane(0);
                        spawnQuotePlane(-6);
                        spawnQuotePlane(-12);
                    }

                    if (time - lastQuoteSpawnTime >= QUOTE_SPAWN_INTERVAL && quotePlanes.length < MAX_QUOTES_ON_SCREEN) {
                        spawnQuotePlane(0);
                        lastQuoteSpawnTime = time;
                    }

                    for (let i = quotePlanes.length - 1; i >= 0; i--) {
                        const plane = quotePlanes[i];
                        const mat = quoteMats[i];

                        plane.position.y += 0.09;

                        if (plane.position.y > yTop + 4) {
                            scene.remove(plane);
                            if (mat.map) mat.map.dispose();
                            mat.dispose();
                            quotePlanes.splice(i, 1);
                            quoteMats.splice(i, 1);
                            quoteIndices.splice(i, 1);
                            continue;
                        }

                        const y = plane.position.y;
                        let qOpacity = 0;
                        const fadeInEnd = yBottom + 14;
                        const fadeOutStart = yTop - 14;

                        if (y >= yBottom && y <= fadeInEnd) {
                            qOpacity = THREE.MathUtils.smoothstep(y, yBottom, fadeInEnd) * 1.0;
                        }
                        else if (y > fadeInEnd && y < fadeOutStart) {
                            qOpacity = 1.0;
                        }
                        else if (y >= fadeOutStart && y <= yTop) {
                            qOpacity = (1 - THREE.MathUtils.smoothstep(y, fadeOutStart, yTop)) * 1.0;
                        }
                        mat.opacity = qOpacity;

                        plane.quaternion.copy(camera.quaternion);
                    }
                }
                else if (phase === "transition" || phase === "gallery") {
                    for (let i = quotePlanes.length - 1; i >= 0; i--) {
                        scene.remove(quotePlanes[i]);
                        if (quoteMats[i].map) quoteMats[i].map.dispose();
                        quoteMats[i].dispose();
                    }
                    quotePlanes.length = 0;
                    quoteMats.length = 0;
                    quoteIndices.length = 0;
                }

                if (phase === "gallery") {
                    if (globeMat.opacity > 0) globeMat.opacity -= 0.05; else globe.visible = false;
                    fireMat.opacity = THREE.MathUtils.lerp(fireMat.opacity, 0.8, 0.01);
                    const fPos = fireGeo.attributes.position.array;
                    for(let i=0; i<fireCount; i++){ fPos[i*3+1] += fireSpeeds[i]; if(fPos[i*3+1] > 25) { fPos[i*3+1] = -30; fPos[i*3] = (Math.random()-0.5)*50; } }
                    fireGeo.attributes.position.needsUpdate = true;

                    function checkOverlap(x, y, z, width, height) {
                        const MIN_DISTANCE = 6;
                        for (let p of photos) {
                            const dx = x - p.group.position.x;
                            const dy = y - p.group.position.y;
                            const dz = z - p.group.position.z;
                            const distance = Math.sqrt(dx * dx + dy * dy + dz * dz);
                            if (distance < MIN_DISTANCE) {
                                return true;
                            }
                        }
                        return false;
                    }

                    photos.forEach(p => {
                        if (p.isZoomed) {
                            p.mesh.material.opacity = THREE.MathUtils.lerp(p.mesh.material.opacity, 1, 0.1);
                            p.group.position.lerp(new THREE.Vector3(0, 0, 8), 0.1);
                            p.group.quaternion.slerp(camera.quaternion, 0.1);
                        } else {
                            p.group.position.y += p.speed;
                            p.group.quaternion.copy(camera.quaternion);
                            const y = p.group.position.y;
                            let targetOpacity = 1;
                            if (y < -20) targetOpacity = THREE.MathUtils.smoothstep(y, -35, -20);
                            else if (y > 10) targetOpacity = 1 - THREE.MathUtils.smoothstep(y, 10, 25);
                            p.mesh.material.opacity = targetOpacity;
                            
                            if (p.group.position.y > 25) {
                                if (time - lastPhotoSpawnTime >= MIN_SPAWN_INTERVAL) {
                                    let newX, newY = -35;
                                    let attempts = 0;
                                    do {
                                        newX = (Math.random() - 0.5) * 22;
                                        attempts++;
                                    } while (checkOverlap(newX, newY, 0, p.width, p.height) && attempts < 5);
                                    
                                    if (attempts >= 5 || !checkOverlap(newX, newY, 0, p.width, p.height)) {
                                        p.group.position.y = newY;
                                        p.group.position.x = newX;
                                        p.group.position.z = (Math.random() - 0.5) * 10;
                                        p.mesh.material.opacity = 0;
                                        lastPhotoSpawnTime = time;
                                    }
                                }
                            }
                        }
                        p.shadow.material.opacity = (0.7 + Math.sin(time * 3) * 0.3) * p.mesh.material.opacity;
                    });
                }
                renderer.render(scene, camera);
            }
            window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
            animate();
        }
    </script>
</body>
